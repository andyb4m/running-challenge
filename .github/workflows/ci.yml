name: CI

on:
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Lint, Type-check & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm test
        env:
          # Stubs so Firebase/Strava imports don't crash during tests
          NEXT_PUBLIC_FIREBASE_API_KEY: test
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: test
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: test
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: test
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: test
          NEXT_PUBLIC_FIREBASE_APP_ID: test
          FIREBASE_ADMIN_PROJECT_ID: test
          FIREBASE_ADMIN_CLIENT_EMAIL: test@test.iam.gserviceaccount.com
          FIREBASE_ADMIN_PRIVATE_KEY: "-----BEGIN RSA PRIVATE KEY-----\nMIIEowIBAAK\n-----END RSA PRIVATE KEY-----"
          STRAVA_CLIENT_ID: "0"
          STRAVA_CLIENT_SECRET: test
          STRAVA_WEBHOOK_VERIFY_TOKEN: test
          NEXT_PUBLIC_BASE_URL: http://localhost:3000
          NEXT_PUBLIC_STRAVA_CLIENT_ID: "0"
