<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Summerfit Challenge 2026</title>
    <style>
        :root {
            --main-background: #ffffff;
            --accent-color: #ffb700; /* Golden/Amber Accents */
            --text-color: #000000;
            --dark-background: #333333;
            --dark-text: #ffffff;
        }

        body {
            background-color: var(--main-background);
            color: var(--text-color);
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }

        header {
            background-color: var(--accent-color);
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        nav {
            margin: 0;
        }

        nav ul {
            list-style-type: none;
            padding: 0;
            display: flex;
            gap: 15px;
        }

        nav a {
            color: var(--text-color);
            text-decoration: none;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            padding: 20px;
        }

        .challenge-form {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin: 20px;
        }

        .ranking-table, .activities-feed {
            margin: 20px;
            border-collapse: collapse;
            width: 100%;
        }

        .ranking-table th, .activities-feed th, .ranking-table td, .activities-feed td {
            border: 1px solid var(--accent-color);
            padding: 10px;
            text-align: center;
        }
    </style>
</head>
<body>
    <header>
        <h1>Summerfit Challenge 2026</h1>
        <nav>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">About</a></li>
                <li><a href="#">Submit Activity</a></li>
                <li><a href="#">Ranking</a></li>
            </ul>
        </nav>
    </header>
    <div class="grid">
        <form class="challenge-form">
            <h2>Submit Zone Training Activities</h2>
            <label for="activity">Activity:</label>
            <input type="text" id="activity" name="activity" required />
            <label for="time">Time (HH:MM:SS):</label>
            <input type="time" id="time" name="time" required />
            <button type="submit">Submit</button>
        </form>
        <table class="ranking-table">
            <thead>
                <tr>
                    <th>Rank</th>
                    <th>Name</th>
                    <th>Time Submitted</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>1</td>
                    <td>John Doe</td>
                    <td>00:30:15</td>
                </tr>
            </tbody>
        </table>
        <div class="activities-feed">
            <h2>Activities Feed</h2>
            <p>No activities submitted yet.</p>
        </div>
    </div>
</body>
</html>
