<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Running Challenge 2024 - FitChallenge</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
          /* Primary Colors */
          --primary-color: #6366f1;
          --primary-dark: #4f46e5;
          --primary-light: #8b5cf6;
          --secondary-color: #06d6a0;
          --secondary-dark: #059669;
          
          /* Background Colors */
          --background-dark: #0f0f23;
          --background-secondary: #1a1a2e;
          --card-background: #16213e;
          --card-hover: #1e2749;
          
          /* Text Colors */
          --text-primary: #ffffff;
          --text-secondary: #94a3b8;
          --text-muted: #64748b;
          
          /* Border & Accent Colors */
          --border-color: #334155;
          --border-light: #475569;
          --success-color: #10b981;
          --warning-color: #f59e0b;
          --error-color: #ef4444;
          --info-color: #3b82f6;
          
          /* Gradients */
          --gradient-primary: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
          --gradient-secondary: linear-gradient(135deg, #06d6a0 0%, #059669 100%);
          --gradient-hero: linear-gradient(135deg, #0f0f23 0%, #1a1a2e 50%, #16213e 100%);
          
          /* Spacing */
          --spacing-xs: 0.25rem;
          --spacing-sm: 0.5rem;
          --spacing-md: 1rem;
          --spacing-lg: 1.5rem;
          --spacing-xl: 2rem;
          --spacing-2xl: 3rem;
          
          /* Border Radius */
          --radius-sm: 0.375rem;
          --radius-md: 0.5rem;
          --radius-lg: 0.75rem;
          --radius-xl: 1rem;
          --radius-2xl: 1.5rem;
          
          /* Transitions */
          --transition-fast: 0.15s ease;
          --transition-normal: 0.3s ease;
          --transition-slow: 0.5s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--background-dark);
            color: var(--text-primary);
            line-height: 1.6;
        }

        /* Navigation */
        .challenge-nav {
            background: rgba(15, 15, 35, 0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-color);
            padding: var(--spacing-lg) 0;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 var(--spacing-lg);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .back-link {
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 500;
            transition: var(--transition-normal);
            padding: var(--spacing-sm) var(--spacing-md);
            border-radius: var(--radius-md);
        }

        .back-link:hover {
            background: rgba(99, 102, 241, 0.1);
            color: var(--primary-light);
        }

        .challenge-nav h1 {
            color: var(--text-primary);
            font-size: 1.5rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
        }

        .challenge-nav h1 i {
            color: var(--primary-color);
        }

        /* Container */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 var(--spacing-lg);
        }

        /* Rest of your existing styles with updated color scheme */
        /* Update all your existing CSS to use the new CSS variables */
        /* I'll show the key updates below */

        .card {
            background: var(--card-background);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-xl);
            padding: var(--spacing-xl);
            transition: var(--transition-normal);
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
            border-color: var(--primary-color);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: var(--spacing-sm);
            padding: var(--spacing-sm) var(--spacing-lg);
            border: none;
            border-radius: var(--radius-md);
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            transition: var(--transition-normal);
            font-size: 0.875rem;
        }

        .btn-primary {
            background: var(--gradient-primary);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.3);
        }

        /* Update your existing styles to match the new design system */
        /* This ensures consistency between home page and challenge page */

        @media (max-width: 768px) {
            .nav-container {
                flex-direction: column;
                gap: var(--spacing-md);
                text-align: center;
            }
            
            .container {
                padding: 0 var(--spacing-md);
            }
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="challenge-nav">
        <div class="nav-container">
            <a href="/" class="back-link">
                <i class="fas fa-arrow-left"></i>
                Back to Challenges
            </a>
            <h1>
                <i class="fas fa-running"></i>
                Running Challenge 2024
            </h1>
            <div></div> <!-- Spacer for flexbox -->
        </div>
    </nav>

    <!-- Your existing challenge content goes here -->

</body>
</html>
